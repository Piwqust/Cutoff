<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }

  .stage {
    position: relative;
    width: 1024px;
    height: 1024px;
    /* Brand green-black, subtle vertical lift */
    background:
      radial-gradient(120% 90% at 50% -10%, #0d2018 0%, #07110d 42%, #050807 100%);
    overflow: hidden;
  }

  /* Big soft mint glow behind the chip — "studio lamp at 11pm" */
  .glow {
    position: absolute;
    left: 50%; top: 47%;
    width: 760px; height: 760px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 50% 45%,
      rgba(101,242,176,0.55) 0%,
      rgba(66,232,156,0.28) 32%,
      rgba(34,201,122,0.08) 55%,
      rgba(34,201,122,0) 72%);
    filter: blur(8px);
  }

  /* faint diagonal sheen across the whole tile */
  .sheen {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 38%);
    mix-blend-mode: screen;
  }

  .chip-wrap {
    position: absolute;
    left: 50%; top: 50%;
    width: 620px; height: 620px;
    transform: translate(-50%, -51%);
  }

  /* contact shadow under the chip */
  .chip-wrap::after {
    content: "";
    position: absolute;
    left: 50%; bottom: -54px;
    width: 460px; height: 90px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 70%);
    filter: blur(6px);
  }

  /* ---- The poker chip body ---- */
  .chip {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(125% 125% at 32% 22%,
        #ccffe8 0%,
        #7cf7c2 14%,
        #42e89c 40%,
        #16a86a 76%,
        #0c6f46 100%);
    box-shadow:
      /* outer dark seat */
      0 34px 78px rgba(0,0,0,0.6),
      /* glossy top rim highlight */
      inset 0 18px 34px rgba(255,255,255,0.8),
      /* reflected mint rim-light at the bottom (glass) */
      inset 0 -8px 22px rgba(140,255,205,0.45),
      /* bottom inner shade for volume */
      inset 0 -52px 72px rgba(2,34,22,0.85),
      /* crisp edge */
      inset 0 0 0 6px rgba(255,255,255,0.22),
      inset 0 0 0 7px rgba(2,34,22,0.4);
  }

  /* chip edge notches (classic poker-chip rim spots) */
  .notches {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    background: repeating-conic-gradient(
      from 0deg,
      rgba(245,255,250,0.92) 0deg 7deg,
      rgba(245,255,250,0) 7deg 22.5deg);
    -webkit-mask: radial-gradient(circle, transparent 0 270px, #000 270px 300px, transparent 300px);
            mask: radial-gradient(circle, transparent 0 270px, #000 270px 300px, transparent 300px);
    opacity: 0.85;
    filter: drop-shadow(0 1px 1px rgba(3,40,26,0.4));
  }

  /* inner ring groove */
  .inner-ring {
    position: absolute;
    inset: 96px;
    border-radius: 50%;
    background:
      radial-gradient(120% 120% at 34% 26%,
        rgba(206,255,232,0.95) 0%,
        rgba(86,240,182,0.6) 30%,
        rgba(34,201,122,0.15) 60%,
        rgba(34,201,122,0) 75%);
    box-shadow:
      inset 0 6px 16px rgba(255,255,255,0.5),
      inset 0 -16px 28px rgba(3,40,26,0.55),
      inset 0 0 0 4px rgba(255,255,255,0.22),
      inset 0 0 0 5px rgba(3,40,26,0.28);
  }

  /* glossy top specular highlight (glass) */
  .gloss {
    position: absolute;
    left: 13%; top: 6%;
    width: 74%; height: 46%;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 26%,
      rgba(255,255,255,0.95) 0%,
      rgba(255,255,255,0.4) 40%,
      rgba(255,255,255,0) 70%);
    filter: blur(3px);
  }

  /* bright crescent rim highlight hugging the top edge */
  .crescent {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.9) 0%,
      rgba(255,255,255,0) 14%);
    -webkit-mask: radial-gradient(circle, transparent 0 296px, #000 296px 304px, transparent 304px);
            mask: radial-gradient(circle, transparent 0 296px, #000 296px 304px, transparent 304px);
    filter: blur(1px);
  }

  /* tiny chromatic glints, echoing the reference glass look */
  .glint {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
    filter: blur(2px);
  }
  .glint.a { left: 30%; top: 20%; width: 70px; height: 70px;
    background: radial-gradient(circle, rgba(221,251,122,0.8), rgba(221,251,122,0) 70%); }
  .glint.b { right: 22%; top: 30%; width: 48px; height: 48px;
    background: radial-gradient(circle, rgba(255,154,122,0.7), rgba(255,154,122,0) 70%); }

  /* ---- Mascot eyes ---- */
  .eyes {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -52%);
    width: 268px; height: 150px;
  }
  .eye {
    position: absolute;
    top: 0;
    width: 100px; height: 132px;
    border-radius: 50%;
    background: radial-gradient(120% 120% at 40% 30%, #0c2a1f 0%, #061712 60%, #03100b 100%);
    box-shadow:
      inset 0 6px 10px rgba(0,0,0,0.5),
      0 3px 6px rgba(3,40,26,0.45);
  }
  .eye.left  { left: 0; }
  .eye.right { right: 0; }
  /* eye specular highlight */
  .eye::before {
    content: "";
    position: absolute;
    left: 24%; top: 14%;
    width: 36px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.95), rgba(255,255,255,0) 70%);
  }
  /* small secondary catchlight */
  .eye::after {
    content: "";
    position: absolute;
    right: 22%; bottom: 20%;
    width: 14px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(101,242,176,0.9), rgba(101,242,176,0) 70%);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="chip-wrap">
      <div class="chip"></div>
      <div class="notches"></div>
      <div class="inner-ring"></div>
      <div class="glint a"></div>
      <div class="glint b"></div>
      <div class="gloss"></div>
      <div class="crescent"></div>
      <div class="eyes">
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
    </div>
    <div class="sheen"></div>
  </div>
</body>
</html>
