name: MTTPokerTrainer
options:
  bundleIdPrefix: com.mttpokertrainer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""

targets:
  MTTPokerTrainer:
    type: application
    platform: iOS
    sources:
      - path: MTTPokerTrainer
        excludes:
          - "**/*.md"
    resources:
      - path: MTTPokerTrainer/Resources
      - path: MTTPokerTrainer/Assets.xcassets
    info:
      path: MTTPokerTrainer/Info.plist
      properties:
        CFBundleDisplayName: MTT Trainer
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: BackgroundDeep
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mttpokertrainer.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  MTTPokerTrainerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MTTPokerTrainerTests
    dependencies:
      - target: MTTPokerTrainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mttpokertrainer.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MTTPokerTrainer:
    build:
      targets:
        MTTPokerTrainer: all
        MTTPokerTrainerTests: [test]
    test:
      targets:
        - MTTPokerTrainerTests
    run:
      config: Debug
