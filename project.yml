name: Cutoff
options:
  bundleIdPrefix: com.cutoff
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: WNRXX7YZ2U
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  Cutoff:
    type: application
    platform: iOS
    sources:
      - path: Cutoff
        excludes:
          - "**/*.md"
    resources:
      - path: Cutoff/Resources
      - path: Cutoff/Assets.xcassets
    info:
      path: Cutoff/Info.plist
      properties:
        CFBundleDisplayName: Cutoff
        CFBundleShortVersionString: "0.0.6"
        CFBundleVersion: "6"
        UILaunchScreen:
          UIColorName: BackgroundDeep
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.cutoff.app.deeplink
            CFBundleURLSchemes:
              - cutoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.damirkadyroff.cutoff
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  CutoffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CutoffTests
    dependencies:
      - target: Cutoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.damirkadyroff.cutoff.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Cutoff:
    build:
      targets:
        Cutoff: all
        CutoffTests: [test]
    test:
      targets:
        - CutoffTests
    run:
      config: Debug
